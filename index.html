<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="https://ka-f.webawesome.com/webawesome@3.9.0/styles/webawesome.css" />
    <script type="module" src="https://ka-f.webawesome.com/webawesome@3.9.0/webawesome.loader.js"></script>

</head>

<body>
    <main>
        <aside class="side">
            <div class="title">
                <wa-icon name="list" id="list"></wa-icon>
                <h3>Task Manager</h3>
            </div>
            <div class="search-container">
                <wa-icon name="magnifying-glass" id="search-icon"></wa-icon>
                <input type="text" placeholder="Search..." id="search">
            </div>
            <div class="form-container">
                <h4>Add a New Task</h4>
                <form action="">
                    <input type="text" placeholder="Task Name">
                    <input type="date" name="" id="">
                    <select name="" id="">
                        <option value="todo">To Do</option>
                        <option value="inprogress">In Progress</option>
                        <option value="Complete">Complete</option>
                    </select>
                    <button type="submit">Add</button>
                </form>
            </div>
        </aside>
        <div class="right-container">
            <div class="card" id="todo">
                <ul id="todo-list"></ul>
            </div>
            <div class="card" id="inprogress">
                <ul class="inprogress-list"></ul>
            </div>
            <div class="card" id="complete">
                <ul class="complete-list"></ul>
            </div>
            <div class="card" id="overdue">
                <ul class="overdue-list"></ul>
            </div>
        </div>
    </main>
</body>

</html>
