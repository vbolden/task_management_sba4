<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="https://ka-f.webawesome.com/webawesome@3.9.0/styles/webawesome.css" />
    <script type="module" src="https://ka-f.webawesome.com/webawesome@3.9.0/webawesome.loader.js"></script>

</head>

<body>
    <main>
        <aside class="side">
            <div class="title">
                <wa-icon name="list" id="list"></wa-icon>
                <h3>Task Manager</h3>
            </div>
            <div class="search-container">
                <wa-icon name="magnifying-glass" id="search-icon"></wa-icon>
                <input type="text" placeholder="Search..." id="search">
            </div>
            <div class="form-container">
                <h4>Add a New Task</h4>
                <form action="">
                    <input type="text" id="task-name" placeholder="Task Name">
                    <input type="date" id="task-date" name="" id="">
                    <select name="" id="task-status">
                        <option value="To Do">To Do</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Complete">Complete</option>
                    </select>
                    <button type="submit" id="add-btn">Add</button>
                </form>
            </div>
        </aside>
        <div class="right-container">
            <header></header>
            <div class="page-break"></div>
            <div class="cards-wrapper">
                <div class="card" id="todo">
                    <div class="line"></div>
                    <div class="card-content">
                        <h3>To Do</h3>
                        <ul id="todo-list"></ul>
                    </div>
                </div>
                <div class="card" id="inprogress">
                    <div class="line"></div>
                    <div class="card-content">
                        <h3>In Progress</h3>
                        <ul id="inprogress-list"></ul>
                    </div>
                </div>
                <div class="card" id="complete">
                    <div class="line"></div>
                    <div class="card-content">
                        <h3>Completed</h3>
                        <ul id="complete-list"></ul>
                    </div>
                </div>
                <div class="card" id="overdue">
                    <div class="line"></div>
                    <div class="card-content">
                        <h3>Overdue</h3>
                        <ul id="overdue-list"></ul>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
